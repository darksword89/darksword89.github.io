<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShapeShift Arena - Stable Build</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  overflow:hidden;
  background:#0b1020;
  color:white;

  background-image:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 25%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03), transparent 25%);
}

canvas{
  display:block;
}

#ui{
  position:absolute;
  top:20px;
  left:20px;
  width:280px;
  padding:16px;
  border-radius:14px;
  background:rgba(10,15,30,0.85);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  z-index:10;
}

h1{
  color:#93c5fd;
  margin-bottom:10px;
}

p{
  margin-bottom:6px;
}

.ability{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
}

#message{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  padding:12px 24px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  z-index:10;
}

#statsChart{
  position:absolute;
  bottom:20px;
  right:20px;
  background:rgba(0,0,0,0.6);
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  z-index:10;
}

#healthBar{
  position:absolute;
  top:20px;
  right:20px;
  width:220px;
  height:28px;
  background:#111827;
  border:2px solid white;
  border-radius:12px;
  overflow:hidden;
  z-index:20;
}

#healthFill{
  width:100%;
  height:100%;
  background:#22c55e;
}

#restartButton{
  display:none;
  position:absolute;
  top:60%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:16px 32px;
  font-size:24px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
  z-index:20;
}
</style>
</head>

<body>

<div id="ui">

  <h1>ShapeShift Arena</h1>

  <p><strong>Move:</strong> WASD / Arrow Keys</p>
  <p><strong>Forms:</strong> 1, 2, 3</p>
  <p><strong>SPACE:</strong> Ability</p>
  <p><strong>SHIFT:</strong> Teleport</p>

  <div class="ability">
    <strong>Current Form:</strong>
    <div id="formName">Traffic Cone</div>
  </div>

  <div class="ability">
    <strong>Ability:</strong>
    <div id="abilityText">Sprint Boost</div>
  </div>

</div>

<div id="message">Survive the robots.</div>

<canvas id="statsChart" width="260" height="120"></canvas>

<div id="healthBar">
  <div id="healthFill"></div>
</div>

<button id="restartButton">Again</button>

<canvas id="gameCanvas"></canvas>

<script>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const statsChart = document.getElementById('statsChart');
const statsCtx = statsChart.getContext('2d');

function resizeCanvas(){

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resizeCanvas();

window.addEventListener('resize', resizeCanvas);

const formName = document.getElementById('formName');
const abilityText = document.getElementById('abilityText');
const message = document.getElementById('message');
const restartButton = document.getElementById('restartButton');
const healthFill = document.getElementById('healthFill');

const keys = {};
const bullets = [];
const particles = [];
const enemies = [];
const props = [];

let gameOver = false;
let playerHealth = 100;
let robotsKilled = 0;
let bossSpawned = false;
let flashEffect = 0;
let robotFreezeTimer = 0;

const killHistory = [];

const camera = {
  shake:0
};

const player = {

  x:200,
  y:200,
  width:40,
  height:40,
  velocityX:0,
  velocityY:0,
  speed:4,
  form:'cone'
};

const walls = [

  { x:300, y:100, w:100, h:300 },
  { x:700, y:250, w:250, h:80 }
];

for(let i=0;i<50;i++){

  props.push({

    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,
    vx:(Math.random()-0.5)*1.5,
    vy:(Math.random()-0.5)*1.5,
    type:['cone','lamp','vending'][Math.floor(Math.random()*3)]
  });
}

function spawnEnemy(){

  enemies.push({

    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()*2+1)*(Math.random()>0.5?1:-1),
    vy:(Math.random()*2+1)*(Math.random()>0.5?1:-1),
    type:'robot',
    health:1
  });
}

for(let i=0;i<8;i++){
  spawnEnemy();
}

setInterval(()=>{

  for(let i=0;i<5;i++){
    spawnEnemy();
  }

  message.innerText = '5 new robots entered the arena!';

},10000);

function setForm(form){

  player.form = form;

  if(form === 'cone'){

    player.speed = 4;

    formName.innerText = 'Traffic Cone 🚧';
    abilityText.innerText = 'Sprint Boost';
  }

  if(form === 'vending'){

    player.speed = 2.5;

    formName.innerText = 'Vending Machine 🏧';
    abilityText.innerText = 'Shoot Soda';
  }

  if(form === 'lamp'){

    player.speed = 3;

    formName.innerText = 'Lamp 💡';
    abilityText.innerText = 'Flash Pulse';
  }
}

window.addEventListener('keydown',(e)=>{

  keys[e.key.toLowerCase()] = true;

  if(e.key === '1') setForm('cone');
  if(e.key === '2') setForm('vending');
  if(e.key === '3') setForm('lamp');

  if(e.key === 'Shift'){

    player.x = Math.random() * (canvas.width - 100) + 50;
    player.y = Math.random() * (canvas.height - 100) + 50;

    flashEffect = 20;

    for(let i=0;i<25;i++){

      particles.push({

        x:player.x,
        y:player.y,
        size:Math.random()*6,
        life:40,
        vx:(Math.random()-0.5)*10,
        vy:(Math.random()-0.5)*10
      });
    }

    message.innerText = 'Teleported!';
  }

  if(e.code === 'Space'){

    if(player.form === 'cone'){

      player.speed = 12;

      message.innerText = 'Sprint active';
    }

    if(player.form === 'lamp'){

      flashEffect = 40;
      robotFreezeTimer = 300;

      message.innerText = 'Robots frozen!';
    }

    if(player.form === 'vending'){

      const angle = Math.random()*Math.PI*2;

      bullets.push({

        x:player.x+20,
        y:player.y+20,
        vx:Math.cos(angle)*10,
        vy:Math.sin(angle)*10
      });

      message.innerText = 'Soda launched';
    }
  }
});

window.addEventListener('keyup',(e)=>{

  keys[e.key.toLowerCase()] = false;

  if(e.code === 'Space' && player.form === 'cone'){

    player.speed = 4;

    message.innerText = 'Sprint ended';
  }
});

function movePlayer(){

  if(gameOver) return;

  let moveX = 0;
  let moveY = 0;

  if(keys['w'] || keys['arrowup']) moveY -= 1;
  if(keys['s'] || keys['arrowdown']) moveY += 1;
  if(keys['a'] || keys['arrowleft']) moveX -= 1;
  if(keys['d'] || keys['arrowright']) moveX += 1;

  player.velocityX += moveX * (player.speed * 0.12);
  player.velocityY += moveY * (player.speed * 0.12);

  player.velocityX *= 0.82;
  player.velocityY *= 0.82;

  player.x += player.velocityX;
  player.y += player.velocityY;

  player.x = Math.max(0, Math.min(canvas.width - 50, player.x));
  player.y = Math.max(0, Math.min(canvas.height - 50, player.y));
}

function updateEnemies(){

  if(robotFreezeTimer > 0){
    robotFreezeTimer--;
  }

  enemies.forEach((enemy)=>{

    if(enemy.type === 'boss'){

      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;

      const angle = Math.atan2(dy,dx);

      enemy.x += Math.cos(angle)*1.2;
      enemy.y += Math.sin(angle)*1.2;

    }else{

      if(!(robotFreezeTimer > 0)){

        enemy.x += enemy.vx;
        enemy.y += enemy.vy;
      }
    }

    if(enemy.x < 0 || enemy.x > canvas.width){
      enemy.vx *= -1;
    }

    if(enemy.y < 0 || enemy.y > canvas.height){
      enemy.vy *= -1;
    }

    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;

    const distance = Math.sqrt(dx*dx + dy*dy);

    if(distance < 35 && !gameOver){

      playerHealth -= enemy.type === 'boss' ? 1 : 0.2;

      healthFill.style.width = playerHealth + '%';

      if(playerHealth > 60){

        healthFill.style.background = '#22c55e';

      }else if(playerHealth > 30){

        healthFill.style.background = '#facc15';

      }else{

        healthFill.style.background = '#ef4444';
      }

      if(playerHealth <= 0){

        gameOver = true;

        message.innerText = 'GAME OVER';
      }
    }
  });
}

function updateBullets(){

  bullets.forEach((bullet, bulletIndex)=>{

    bullet.x += bullet.vx;
    bullet.y += bullet.vy;

    enemies.forEach((enemy, enemyIndex)=>{

      const dx = bullet.x - enemy.x;
      const dy = bullet.y - enemy.y;

      const distance = Math.sqrt(dx*dx + dy*dy);

      if(distance < 25){

        bullets.splice(bulletIndex,1);

        if(enemy.type === 'boss'){

          enemy.health--;

          if(enemy.health <= 0){

            enemies.splice(enemyIndex,1);

            message.innerText = 'BOSS DESTROYED!';
          }

        }else{

          enemies.splice(enemyIndex,1);

          robotsKilled++;

          if(robotsKilled >= 100 && !bossSpawned){

            bossSpawned = true;

            enemies.push({

              x:canvas.width/2,
              y:100,
              vx:2,
              vy:2,
              type:'boss',
              health:40
            });

            flashEffect = 40;
            camera.shake = 20;

            message.innerText = '⚠️ GIANT BOSS ARRIVED ⚠️';
          }
        }

        for(let i=0;i<40;i++){

          particles.push({

            x:enemy.x,
            y:enemy.y,
            size:Math.random()*8+2,
            life:50,
            vx:(Math.random()-0.5)*12,
            vy:(Math.random()-0.5)*12
          });
        }

        camera.shake = 12;

        killHistory.push(robotsKilled);

        if(killHistory.length > 20){
          killHistory.shift();
        }
      }
    });
  });
}

function updateParticles(){

  particles.forEach((particle,index)=>{

    particle.life--;

    particle.x += particle.vx;
    particle.y += particle.vy;

    if(particle.life <= 0){

      particles.splice(index,1);
    }
  });

  props.forEach((prop)=>{

    prop.x += prop.vx;
    prop.y += prop.vy;

    if(prop.x < 0 || prop.x > canvas.width) prop.vx *= -1;
    if(prop.y < 0 || prop.y > canvas.height) prop.vy *= -1;
  });
}

function drawBackground(){

  // reset camera transform first
  ctx.setTransform(1,0,0,1,0,0);

  // camera shake
  if(camera.shake > 0){

    ctx.translate(
      (Math.random()-0.5) * camera.shake,
      (Math.random()-0.5) * camera.shake
    );

    camera.shake *= 0.9;
  }

  // background gradient
  const gradient = ctx.createLinearGradient(
    0,
    0,
    0,
    canvas.height
  );

  gradient.addColorStop(0,'#0f172a');
  gradient.addColorStop(1,'#1e293b');

  ctx.fillStyle = gradient;

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );
}

function drawWalls(){

  walls.forEach((wall)=>{

    ctx.fillStyle = '#334155';

    ctx.fillRect(
      wall.x,
      wall.y,
      wall.w,
      wall.h
    );
  });
}

function drawProps(){

  ctx.font = '30px Arial';

  props.forEach((prop)=>{

    if(prop.type === 'cone'){
      ctx.fillText('🚧', prop.x, prop.y);
    }

    if(prop.type === 'lamp'){
      ctx.fillText('💡', prop.x, prop.y);
    }

    if(prop.type === 'vending'){
      ctx.fillText('🏧', prop.x, prop.y);
    }
  });
}

function drawEnemies(){

  enemies.forEach((enemy)=>{

    if(enemy.type === 'robot'){

      ctx.shadowBlur = 15;
      ctx.shadowColor = '#22c55e';

      ctx.font = '40px Arial';

      ctx.fillText(
        '🤖',
        enemy.x - 20,
        enemy.y + 10
      );

      ctx.shadowBlur = 0;
    }

    if(enemy.type === 'boss'){

      ctx.shadowBlur = 40;
      ctx.shadowColor = '#ef4444';

      ctx.font = '220px Arial';

      ctx.fillText(
        '👹',
        enemy.x - 100,
        enemy.y + 100
      );

      ctx.shadowBlur = 0;

      ctx.fillStyle = 'red';

      ctx.fillRect(
        enemy.x - 150,
        enemy.y - 150,
        300,
        20
      );

      ctx.fillStyle = '#22c55e';

      ctx.fillRect(
        enemy.x - 150,
        enemy.y - 150,
        (enemy.health / 40) * 300,
        20
      );
    }
  });
}

function drawBullets(){

  ctx.font = '24px Arial';

  bullets.forEach((bullet)=>{

    ctx.fillText(
      '🥫',
      bullet.x,
      bullet.y
    );
  });
}

function drawParticles(){

  particles.forEach((particle)=>{

    ctx.fillStyle = `rgba(255,140,0,${particle.life / 50})`;

    ctx.beginPath();

    ctx.arc(
      particle.x,
      particle.y,
      particle.size,
      0,
      Math.PI*2
    );

    ctx.fill();
  });
}

function drawPlayer(){

  ctx.font = '40px Arial';

  if(player.form === 'cone'){
    ctx.fillText('🚧', player.x, player.y + 35);
  }

  if(player.form === 'vending'){
    ctx.fillText('🏧', player.x, player.y + 35);
  }

  if(player.form === 'lamp'){
    ctx.fillText('💡', player.x, player.y + 35);
  }
}

function drawFlash(){

  if(flashEffect > 0){

    ctx.fillStyle = `rgba(255,255,255,${flashEffect / 40})`;

    ctx.fillRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    flashEffect--;
  }
}

function drawStatsChart(){

  statsCtx.clearRect(0,0,statsChart.width,statsChart.height);

  statsCtx.fillStyle = 'white';
  statsCtx.font = '14px Arial';

  statsCtx.fillText(
    'Robots Destroyed: ' + robotsKilled,
    10,
    20
  );

  statsCtx.strokeStyle = '#38bdf8';
  statsCtx.lineWidth = 3;
  statsCtx.beginPath();

  killHistory.forEach((value,index)=>{

    const x = 10 + index * 12;
    const y = 100 - value * 2;

    if(index === 0){

      statsCtx.moveTo(x,y);

    }else{

      statsCtx.lineTo(x,y);
    }
  });

  statsCtx.stroke();
}

restartButton.addEventListener('click',()=>{

  gameOver = false;

  restartButton.style.display = 'none';

  player.x = 200;
  player.y = 200;

  player.velocityX = 0;
  player.velocityY = 0;

  playerHealth = 100;

  healthFill.style.width = '100%';
  healthFill.style.background = '#22c55e';

  enemies.length = 0;
  bullets.length = 0;
  particles.length = 0;

  robotsKilled = 0;
  bossSpawned = false;

  for(let i=0;i<8;i++){
    spawnEnemy();
  }

  setForm('cone');

  message.innerText = 'Survive the robots.';
});

function gameLoop(){

  drawBackground();

  if(!gameOver){

    movePlayer();
    updateEnemies();
    updateBullets();
    updateParticles();
  }

  drawWalls();
  drawProps();
  drawEnemies();
  drawBullets();
  drawParticles();
  drawPlayer();
  drawFlash();
  drawStatsChart();

  if(gameOver){

    restartButton.style.display = 'block';

    ctx.fillStyle = 'rgba(0,0,0,0.7)';

    ctx.fillRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    ctx.fillStyle = 'white';
    ctx.font = '48px Arial';
    ctx.textAlign = 'center';

    ctx.fillText(
      'GAME OVER',
      canvas.width / 2,
      canvas.height / 2
    );
  }

  requestAnimationFrame(gameLoop);
}

setForm('cone');

gameLoop();

</script>

</body>
</html>
