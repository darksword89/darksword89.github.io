<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lochlann's Time Traveler - Lightning Trail</title>
<style>
body { margin:0; overflow:hidden; background:#111; font-family:Arial; color:white; }
canvas { display:block; margin:0 auto; background:#000; }
.hud { position:absolute; top:15px; right:20px; font-size:18px; }
.hud div { margin-bottom:6px; }
.overlay {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-size:36px;
    text-align:center;
    display:none;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="hud">
  <div id="lives">Lives: 3</div>
  <div id="score">Score: 0</div>
</div>

<div id="overlay" class="overlay"></div>

<audio id="music" src="spooky.mp3" loop></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = 800;
const HEIGHT = 600;
canvas.width = WIDTH;
canvas.height = HEIGHT;

const music = document.getElementById("music");
music.volume = 0.3;

let gameRunning = true;
let bossMode = false;

let baseObstacleSpeed = 5;
let obstacleSpeedMultiplier = 1;

let player = { x:50, y:250, w:50, h:70, speed:5 };
let obstacles = [];
let artifacts = [];
let lightningTrail = [];

let hammer = { active:false, x:-100, y:-100, size:50, speed:12, dir:1 };

let boss = { 
  active:false, 
  x:600, 
  y:200, 
  w:180, 
  h:180, 
  health:200, 
  speed:2.4
};

let lives = 3;
let score = 0;
let nextSpeedIncrease = 30;

const livesEl = document.getElementById("lives");
const scoreEl = document.getElementById("score");
const overlay = document.getElementById("overlay");

let keys = {};
document.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (gameRunning) music.play().catch(()=>{});
});
document.addEventListener("keyup", e => keys[e.key] = false);

function loadImg(src){
    const img = new Image();
    img.src = src;
    return img;
}

const playerImg = loadImg("time_traveler.png");
const monsterImg = loadImg("monster1.png");
const potImg = loadImg("pot.png");
const hammerImg = loadImg("thor_hammer.jpg");
const bgImg = loadImg("background.jpg");

function updateUI(){
    livesEl.textContent = "Lives: " + lives;
    scoreEl.textContent = "Score: " + score;
}

function checkSpeedIncrease(){
    while(score >= nextSpeedIncrease){
        obstacleSpeedMultiplier *= 1.03;
        nextSpeedIncrease += 30;
    }
}

function spawnObstacle(){
    if(!gameRunning || bossMode) return;
    obstacles.push({ x: WIDTH, y: Math.random()*(HEIGHT-50), w:50, h:50 });
}

function spawnArtifact(){
    artifacts.push({ x: Math.random()*(WIDTH-30), y: Math.random()*(HEIGHT-30), w:30, h:30 });
}

function activateBoss(){
    bossMode = true;
    boss.active = true;
    obstacles = [];
    artifacts = [];
    boss.health = 200;
    boss.x = 650;
    boss.y = 200;
}

function loseLife(){
    lives--;
    updateUI();
    if(lives<=0) endGame("GAME OVER");
    else {
        player.x=50; player.y=250;
        obstacles=[];
    }
}

function endGame(text){
    gameRunning=false;
    music.pause();
    music.currentTime=0;
    overlay.style.display="block";
    overlay.textContent = text;
}

function collision(a,b){
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

// Lightning trail particle
function addLightning(x,y){
    lightningTrail.push({ x:x, y:y, life:15 });
}

function update(){

    if(!gameRunning) return;

    let moving = false;

    if(keys["ArrowUp"]){ player.y-=player.speed; moving=true; }
    if(keys["ArrowDown"]){ player.y+=player.speed; moving=true; }
    if(keys["ArrowLeft"]){ player.x-=player.speed; moving=true; }
    if(keys["ArrowRight"]){ player.x+=player.speed; moving=true; }

    if(moving){
        addLightning(player.x + player.w/2, player.y + player.h/2);
    }

    player.x=Math.max(0,Math.min(WIDTH-player.w,player.x));
    player.y=Math.max(0,Math.min(HEIGHT-player.h,player.y));

    // Update lightning life
    for(let i=lightningTrail.length-1;i>=0;i--){
        lightningTrail[i].life--;
        if(lightningTrail[i].life<=0){
            lightningTrail.splice(i,1);
        }
    }

    for(let i=obstacles.length-1;i>=0;i--){
        obstacles[i].x -= baseObstacleSpeed * obstacleSpeedMultiplier;
        if(obstacles[i].x<-50){
            obstacles.splice(i,1);
            continue;
        }
        if(collision(player,obstacles[i])){
            loseLife();
            break;
        }
    }

    for(let i=artifacts.length-1;i>=0;i--){
        if(collision(player,artifacts[i])){
            artifacts.splice(i,1);
            score+=10;
            updateUI();
            checkSpeedIncrease();

            if(score>=100 && !hammer.active){
                hammer.active=true;
                hammer.x=player.x;
                hammer.y=player.y;
                hammer.dir=1;
            }

            if(score>=300 && !bossMode) activateBoss();

            spawnArtifact();
        }
    }

    if(hammer.active){
        hammer.x+=hammer.speed*hammer.dir;
        if(hammer.x>WIDTH) hammer.dir=-1;
        if(hammer.x<player.x){
            hammer.active=false;
            hammer.x=-100;
        }

        const hammerBox = { x:hammer.x, y:hammer.y, w:hammer.size, h:hammer.size };

        for(let i=obstacles.length-1;i>=0;i--){
            if(collision(hammerBox, obstacles[i])){
                obstacles.splice(i,1);
                score+=20;
                updateUI();
                checkSpeedIncrease();
            }
        }

        if(boss.active && collision(hammerBox, boss)){
            boss.health-=10;
            hammer.dir=-1;
            if(boss.health<=0) endGame("YOU WIN!");
        }
    }

    if(boss.active){
        const dx = player.x - boss.x;
        const dy = player.y - boss.y;
        const dist = Math.hypot(dx,dy);

        if(dist>1){
            boss.x += (dx/dist)*boss.speed;
            boss.y += (dy/dist)*boss.speed;
        }

        if(collision(player,boss)) loseLife();
    }
}

function drawLightning(p){
    ctx.strokeStyle = "cyan";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - 20);
    for(let i=0;i<5;i++){
        let offsetX = (Math.random()-0.5)*20;
        let offsetY = i*8;
        ctx.lineTo(p.x + offsetX, p.y - 20 + offsetY);
    }
    ctx.stroke();
}

function draw(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);

    ctx.drawImage(bgImg,0,0,WIDTH,HEIGHT);
    ctx.drawImage(playerImg,player.x,player.y,player.w,player.h);

    obstacles.forEach(o=>ctx.drawImage(monsterImg,o.x,o.y,o.w,o.h));
    artifacts.forEach(a=>ctx.drawImage(potImg,a.x,a.y,a.w,a.h));

    lightningTrail.forEach(drawLightning);

    if(hammer.active)
        ctx.drawImage(hammerImg,hammer.x,hammer.y,hammer.size,hammer.size);

    if(boss.active){
        ctx.drawImage(monsterImg,boss.x,boss.y,boss.w,boss.h);
        ctx.fillStyle="red";
        ctx.fillRect(250,20,(boss.health/200)*300,20);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

spawnArtifact();
setInterval(spawnObstacle,1500);
loop();
</script>
</body>
</html>
